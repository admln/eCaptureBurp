# 工作流名称
name: Build eCaptureBurp JAR

# 触发条件：push到main分支、创建PR到main分支、手动触发
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # 允许手动触发

# 工作流任务
jobs:
  build:
    # 运行环境：最新版Ubuntu
    runs-on: ubuntu-latest
    
    steps:
      # 步骤1：检出代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 拉取完整历史，避免构建时缺少版本信息
      
      # 步骤2：设置JDK环境（根据项目实际使用的Java版本调整，Burp插件通常用8/11）
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin' # 使用Eclipse Temurin JDK
          cache: maven # 如果项目用Gradle，改为 cache: gradle
      
      # 步骤3：构建JAR包（根据项目构建工具选择对应命令）
      - name: Build with Maven
        run: |
          # 先检查是否有pom.xml（Maven项目）
          if [ -f "pom.xml" ]; then
            mvn clean package -DskipTests # 跳过测试加速构建
          elif [ -f "build.gradle" ] || [ -f "build.gradle.kts" ]; then
            # 如果是Gradle项目，执行gradle构建
            chmod +x ./gradlew
            ./gradlew clean build -x test
          else
            echo "未找到Maven/Gradle构建文件，请检查项目结构"
            exit 1
          fi
      
      # 步骤4：上传JAR包作为产物（方便下载）
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: eCaptureBurp-jar
          # 匹配常见的JAR输出路径（覆盖Maven/Gradle）
          path: |
            target/*.jar
            build/libs/*.jar
          # 保留产物90天
          retention-days: 90
